<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@page {
    size: A4;
    margin: 0;
}
body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', 'Helvetica Neue', sans-serif;
}
.cover {
    width: 210mm;
    height: 297mm;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
.cover-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
}
.cover-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent 0%, rgba(0,0,0,0.6) 100%);
    padding: 50mm 20mm 35mm;
    text-align: center;
    color: #ffffff;
}
.cover h1 {
    font-size: 32pt;
    margin: 0 0 5mm;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
    letter-spacing: 1px;
}
.cover h2 {
    font-size: 18pt;
    margin: 0;
    font-weight: 300;
    opacity: 0.9;
    letter-spacing: 0.5px;
}
.year-badge {
    display: inline-block;
    margin-top: 8mm;
    padding: 3mm 8mm;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    font-size: 12pt;
    letter-spacing: 2px;
    opacity: 0.85;
}
</style>
</head>
<body>
<div class="cover">
    {% if cover_image_url %}
    <img class="cover-bg" src="{{ cover_image_url }}" alt="Обложка">
    {% endif %}
    <div class="cover-overlay">
        <h1>{{ class_name }}</h1>
        <h2>{{ school_name }}</h2>
        <div class="year-badge">{{ year }}</div>
    </div>
</div>
</body>
</html>
