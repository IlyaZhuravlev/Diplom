<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@page {
    size: A4;
    margin: 12mm 10mm 10mm;
}
body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', 'Helvetica Neue', sans-serif;
    color: #333;
}

/* ── Заголовок страницы ── */
.page-header {
    text-align: center;
    margin-bottom: 5mm;
    padding-bottom: 3mm;
    border-bottom: 0.5mm solid #e8e8e8;
}
.page-header h2 {
    font-size: 14pt;
    margin: 0 0 1mm;
    color: #2c3e50;
    font-weight: 600;
}
.page-header .subtitle {
    font-size: 8pt;
    color: #999;
    letter-spacing: 0.5px;
}

/* ── Сетка 4×6 ── */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 2.5mm;
    height: 255mm;
}

/* ── Ячейка ученика ── */
.cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    border: 0.3mm solid #ebebeb;
    border-radius: 2mm;
    padding: 1.5mm;
    background: #fafafa;
    overflow: hidden;
}
.cell img {
    width: 100%;
    flex: 1;
    object-fit: cover;
    border-radius: 1.5mm;
    background: #f0f0f0;
}
.cell .placeholder {
    width: 100%;
    flex: 1;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
    border-radius: 1.5mm;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 16pt;
}
.cell .name {
    font-size: 6.5pt;
    margin-top: 1mm;
    text-align: center;
    color: #555;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    font-weight: 500;
}

/* ── Пустая ячейка ── */
.cell.empty {
    border-color: transparent;
    background: transparent;
}
</style>
</head>
<body>

<div class="page-header">
    <h2>{{ class_name }} — Портреты</h2>
    <div class="subtitle">Страница {{ page_num }} из {{ total_pages }}</div>
</div>

<div class="grid">
    {% for student in students %}
    <div class="cell">
        {% if student.photo_url %}
        <img src="{{ student.photo_url }}" alt="{{ student.full_name }}">
        {% else %}
        <div class="placeholder">?</div>
        {% endif %}
        <div class="name">{{ student.full_name }}</div>
    </div>
    {% endfor %}

    {% for _ in range(empty_cells) %}
    <div class="cell empty"></div>
    {% endfor %}
</div>

</body>
</html>
